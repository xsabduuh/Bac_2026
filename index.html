<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>منصة الدراسة - باك مغرب</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
<style>
:root {
  --bg: #0f0f13;
  --bg2: #18181f;
  --bg3: #22222d;
  --border: #2e2e3a;
  --text: #f0f0f5;
  --text2: #a0a0b8;
  --text3: #606078;
  --accent: #6c63ff;
  --accent2: #5a52e0;
  --accent-light: rgba(108,99,255,0.15);
  --green: #22c55e;
  --green-light: rgba(34,197,94,0.15);
  --yellow: #f59e0b;
  --yellow-light: rgba(245,158,11,0.12);
  --red: #ef4444;
  --red-light: rgba(239,68,68,0.12);
  --blue: #3b82f6;
  --radius: 14px;
  --radius-sm: 8px;
  --nav-h: 64px;
  --header-h: 56px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --transition: 0.2s ease;
}
[data-theme="light"] {
  --bg: #f5f5fa;
  --bg2: #ffffff;
  --bg3: #ededf5;
  --border: #e0e0ea;
  --text: #111118;
  --text2: #555568;
  --text3: #9090a8;
  --accent: #5b52f0;
  --accent2: #4a42df;
  --accent-light: rgba(91,82,240,0.1);
  --green: #16a34a;
  --green-light: rgba(22,163,74,0.1);
  --yellow: #d97706;
  --yellow-light: rgba(217,119,6,0.1);
  --red: #dc2626;
  --red-light: rgba(220,38,38,0.1);
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'IBM Plex Sans Arabic', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.5;
  transition: background var(--transition), color var(--transition);
}
#app {
  height: 100vh;        /* fallback للمتصفحات القديمة */
  height: 100dvh;       /* الارتفاع الديناميكي الحقيقي (يحتسب شريط العنوان) */
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}
/* ── HEADER ── */
.header {
  height: var(--header-h);
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 10px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.header-title {
  flex: 1;
  font-weight: 700;
  font-size: 17px;
  color: var(--text);
}
.header-action {
  background: none;
  border: none;
  color: var(--text2);
  font-size: 22px;
  cursor: pointer;
  padding: 6px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background var(--transition), color var(--transition);
}
.header-action:active { background: var(--bg3); }
.back-btn { color: var(--accent); }
/* ── PAGE CONTENT ── */
.page {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding-bottom: calc(var(--nav-h) + 8px);
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}
.page-inner { padding: 16px; }
/* ── BOTTOM NAV ── */
.bottom-nav {
  height: var(--nav-h);
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 8px 0;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--text3);
  font-size: 11px;
  font-family: inherit;
  transition: color var(--transition);
}
.nav-item i { font-size: 22px; transition: transform 0.15s; }
.nav-item.active { color: var(--accent); }
.nav-item.active i { transform: scale(1.15); }
/* ── HOME PAGE ── */
.home-hero {
  background: linear-gradient(135deg, var(--accent) 0%, #9c5cf5 100%);
  border-radius: var(--radius);
  padding: 22px 20px;
  color: #fff;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.home-hero::after {
  content: '';
  position: absolute;
  top: -30px; left: -30px;
  width: 160px; height: 160px;
  background: rgba(255,255,255,0.06);
  border-radius: 50%;
}
.home-hero-label { font-size: 13px; opacity: 0.85; margin-bottom: 4px; }
.home-hero-title { font-size: 22px; font-weight: 700; margin-bottom: 16px; }
.home-hero-progress { display: flex; align-items: center; gap: 14px; }
.progress-ring-wrap { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
.progress-ring-wrap svg { transform: rotate(-90deg); }
.progress-ring-bg { fill: none; stroke: rgba(255,255,255,0.2); stroke-width: 7; }
.progress-ring-fill { fill: none; stroke: #fff; stroke-width: 7; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
.progress-ring-text {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-weight: 700; font-size: 15px;
  line-height: 1.1;
}
.progress-ring-sub { font-size: 10px; opacity: 0.8; }
.home-hero-stats { flex: 1; }
.home-hero-stat { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
.home-hero-stat strong { font-weight: 600; }
.timer-section {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.timer-display {
  font-size: 28px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--accent);
  flex: 1;
  letter-spacing: 1px;
}
.timer-btn {
  border: none;
  cursor: pointer;
  border-radius: 50%;
  width: 48px; height: 48px;
  font-size: 22px;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
}
.timer-btn.start { background: var(--green); color: #fff; }
.timer-btn.pause { background: var(--yellow); color: #fff; }
.timer-btn.reset { background: var(--bg3); color: var(--text2); }
.section-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}
.stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.stat-card-icon { font-size: 22px; margin-bottom: 4px; }
.stat-card-val { font-size: 20px; font-weight: 700; }
.stat-card-lbl { font-size: 12px; color: var(--text3); }
.recent-list { display: flex; flex-direction: column; gap: 8px; }
.recent-item {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: border-color var(--transition);
}
.recent-item:active { border-color: var(--accent); }
.recent-item-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--accent-light);
  color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.recent-item-info { flex: 1; min-width: 0; }
.recent-item-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.recent-item-sub { font-size: 12px; color: var(--text3); }
/* ── SUBJECTS PAGE ── */
.search-bar {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.search-bar i { color: var(--text3); font-size: 18px; }
.search-bar input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  font-family: inherit;
  font-size: 14px;
  color: var(--text);
  direction: rtl;
}
.search-bar input::placeholder { color: var(--text3); }
.category-block { margin-bottom: 16px; }
.category-header {
  background: linear-gradient(135deg, var(--accent) 0%, #9c5cf5 100%);
  color: #fff;
  border-radius: var(--radius);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  margin-bottom: 8px;
}
.category-header-text { flex: 1; font-weight: 700; font-size: 16px; }
.category-badge {
  background: rgba(255,255,255,0.2);
  border-radius: 50px;
  padding: 2px 10px;
  font-size: 12px;
}
.subject-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  overflow: hidden;
}
.subject-header {
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  user-select: none;
}
.subject-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.subject-info { flex: 1; min-width: 0; }
.subject-name { font-weight: 600; font-size: 15px; }
.subject-progress { font-size: 12px; color: var(--text3); margin-top: 2px; }
.subject-chevron { color: var(--text3); font-size: 18px; transition: transform 0.2s; }
.subject-chevron.open { transform: rotate(90deg); }
.subject-body { display: none; border-top: 1px solid var(--border); }
.subject-body.open { display: block; }
.progress-bar-wrap { height: 4px; background: var(--bg3); }
.progress-bar-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.4s; }
.unit-block { border-bottom: 1px solid var(--border); }
.unit-block:last-child { border-bottom: none; }
.unit-header {
  padding: 10px 14px 10px 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  user-select: none;
}
.unit-title { flex: 1; font-size: 14px; font-weight: 500; color: var(--text); }
.unit-chevron { color: var(--text3); font-size: 16px; transition: transform 0.2s; }
.unit-chevron.open { transform: rotate(90deg); }
.unit-body { display: none; background: var(--bg3); }
.unit-body.open { display: block; }
.lesson-item {
  border-bottom: 1px solid var(--border);
  padding: 8px 14px 8px 24px;
}
.lesson-item:last-child { border-bottom: none; }
.lesson-title { font-size: 13px; color: var(--text2); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.lesson-title i { color: var(--text3); font-size: 14px; }
.branch-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  margin: 4px 0;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background var(--transition);
}
.branch-item:active, .branch-item:hover { background: var(--bg2); }
.branch-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  border: 2px solid var(--border);
  background: var(--bg);
  transition: all var(--transition);
}
.branch-dot.done { background: var(--green); border-color: var(--green); }
.branch-dot.partial { background: var(--yellow); border-color: var(--yellow); }
.branch-name { flex: 1; font-size: 13px; color: var(--text2); }
.branch-count { font-size: 11px; color: var(--text3); }
.branch-arrow { color: var(--text3); font-size: 14px; }
/* ── BRANCH VIEW PAGE ── */
.branch-header-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
}
.branch-breadcrumb { font-size: 12px; color: var(--text3); margin-bottom: 6px; line-height: 1.4; }
.branch-main-title { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
.branch-progress-row { display: flex; align-items: center; gap: 10px; }
.branch-progress-bar { flex: 1; height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
.branch-progress-val { font-size: 13px; font-weight: 600; color: var(--accent); }
.partial-list { display: flex; flex-direction: column; gap: 10px; }
.partial-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
  transition: border-color var(--transition);
}
.partial-card.completed { border-color: var(--green); }
.partial-header {
  padding: 14px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  cursor: pointer;
}
.partial-check {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all var(--transition);
  margin-top: 1px;
}
.partial-check.done { background: var(--green); border-color: var(--green); color: #fff; }
.partial-check i { font-size: 13px; }
.partial-info { flex: 1; }
.partial-title { font-size: 14px; font-weight: 500; line-height: 1.4; }
.partial-meta { font-size: 12px; color: var(--text3); margin-top: 4px; display: flex; gap: 12px; }
.partial-body { display: none; border-top: 1px solid var(--border); padding: 14px; }
.partial-body.open { display: block; }
.tab-bar {
  display: flex;
  gap: 4px;
  background: var(--bg3);
  border-radius: var(--radius-sm);
  padding: 4px;
  margin-bottom: 12px;
}
.tab-btn {
  flex: 1;
  border: none;
  background: none;
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  color: var(--text3);
  padding: 6px 4px;
  border-radius: 6px;
  cursor: pointer;
  transition: all var(--transition);
}
.tab-btn.active { background: var(--bg2); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
.content-area {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.7;
}
.notes-textarea {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  font-family: inherit;
  font-size: 13px;
  color: var(--text);
  resize: vertical;
  min-height: 100px;
  outline: none;
  direction: rtl;
  transition: border-color var(--transition);
  line-height: 1.6;
}
.notes-textarea:focus { border-color: var(--accent); }
.save-notes-btn {
  margin-top: 8px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 8px 16px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background var(--transition);
}
.save-notes-btn:active { background: var(--accent2); }
.exercises-area { display: flex; flex-direction: column; gap: 8px; }
.exercise-item {
  background: var(--bg3);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.exercise-check {
  width: 20px; height: 20px;
  border-radius: 4px;
  border: 2px solid var(--border);
  flex-shrink: 0;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
  margin-top: 1px;
}
.exercise-check.done { background: var(--green); border-color: var(--green); color: #fff; }
.exercise-check i { font-size: 12px; }
.exercise-text { flex: 1; font-size: 13px; color: var(--text2); }
.add-exercise-row {
  display: flex; gap: 8px; margin-top: 4px;
}
.add-exercise-input {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-family: inherit;
  font-size: 13px;
  color: var(--text);
  outline: none;
  direction: rtl;
}
.add-exercise-input:focus { border-color: var(--accent); }
.add-exercise-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 8px 14px;
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
}
.review-section { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.review-count { font-size: 13px; color: var(--text2); }
.review-count strong { color: var(--accent); font-size: 18px; }
.review-btn {
  background: var(--accent-light);
  color: var(--accent);
  border: 1px solid var(--accent);
  border-radius: var(--radius-sm);
  padding: 8px 16px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
}
.review-btn:active { background: var(--accent); color: #fff; }
.complete-btn-wrap { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.complete-btn {
  width: 100%;
  border: none;
  border-radius: var(--radius-sm);
  padding: 11px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all var(--transition);
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.complete-btn.done { background: var(--green-light); color: var(--green); }
.complete-btn.undone { background: var(--accent); color: #fff; }
/* ── SCHEDULE PAGE ── */
.week-grid {
  display: grid;
  grid-template-columns: repeat(7,1fr);
  gap: 6px;
  margin-bottom: 16px;
}
.day-cell {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 4px;
  text-align: center;
  cursor: pointer;
  transition: all var(--transition);
}
.day-cell.active { border-color: var(--accent); background: var(--accent-light); }
.day-cell.today { border-color: var(--yellow); }
.day-name { font-size: 10px; color: var(--text3); margin-bottom: 4px; }
.day-num { font-size: 16px; font-weight: 700; }
.day-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); margin: 3px auto 0; opacity: 0; }
.day-cell.has-sessions .day-dot { opacity: 1; }
.sessions-container { display: flex; flex-direction: column; gap: 10px; }
.session-add-card {
  background: var(--bg2);
  border: 1px dashed var(--border);
  border-radius: var(--radius-sm);
  padding: 16px;
  margin-bottom: 10px;
}
.session-add-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: var(--text2); }
.session-add-row { display: flex; gap: 8px; flex-wrap: wrap; }
.session-select {
  flex: 1;
  min-width: 120px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  font-family: inherit;
  font-size: 13px;
  color: var(--text);
  outline: none;
  direction: rtl;
}
.session-time-input {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  font-family: inherit;
  font-size: 13px;
  color: var(--text);
  outline: none;
  width: 100px;
}
.session-add-submit {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 8px 14px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}
.session-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.session-time-badge {
  background: var(--accent-light);
  color: var(--accent);
  border-radius: var(--radius-sm);
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 600;
  flex-shrink: 0;
}
.session-info { flex: 1; }
.session-subject { font-size: 14px; font-weight: 600; }
.session-detail { font-size: 12px; color: var(--text3); }
.session-del {
  background: none;
  border: none;
  color: var(--text3);
  font-size: 18px;
  cursor: pointer;
  padding: 4px;
}
.session-del:active { color: var(--red); }
.empty-state {
  text-align: center;
  padding: 30px 20px;
  color: var(--text3);
}
.empty-state i { font-size: 48px; margin-bottom: 10px; display: block; }
.empty-state p { font-size: 14px; }
/* ── STATS PAGE ── */
.stats-hero-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stats-mini {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  text-align: center;
}
.stats-mini-val { font-size: 20px; font-weight: 700; }
.stats-mini-lbl { font-size: 11px; color: var(--text3); margin-top: 2px; }
.subjects-progress { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.subj-progress-item {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
}
.subj-progress-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.subj-progress-name { font-size: 14px; font-weight: 500; }
.subj-progress-pct { font-size: 13px; font-weight: 700; color: var(--accent); }
.heatmap-grid {
  display: grid;
  grid-template-columns: repeat(13, 1fr);
  gap: 3px;
  margin-bottom: 8px;
}
.heat-cell {
  aspect-ratio: 1;
  border-radius: 3px;
  background: var(--bg3);
  cursor: default;
}
.heat-cell[data-lvl="1"] { background: rgba(108,99,255,0.25); }
.heat-cell[data-lvl="2"] { background: rgba(108,99,255,0.5); }
.heat-cell[data-lvl="3"] { background: rgba(108,99,255,0.75); }
.heat-cell[data-lvl="4"] { background: var(--accent); }
.heatmap-legend { display: flex; align-items: center; gap: 6px; justify-content: flex-end; font-size: 11px; color: var(--text3); }
.heatmap-legend-cell { width: 12px; height: 12px; border-radius: 3px; }
/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: calc(var(--nav-h) + 16px);
  left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: var(--bg);
  border-radius: 50px;
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  z-index: 1000;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
/* ── UTILITY ── */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  border-radius: 50px;
  padding: 3px 10px;
  font-size: 11px;
  font-weight: 600;
}
.chip-green { background: var(--green-light); color: var(--green); }
.chip-yellow { background: var(--yellow-light); color: var(--yellow); }
.chip-accent { background: var(--accent-light); color: var(--accent); }
.divider { height: 1px; background: var(--border); margin: 12px 0; }
.fw700 { font-weight: 700; }
.text-accent { color: var(--accent); }
.text-green { color: var(--green); }
.mt8 { margin-top: 8px; }
.mt12 { margin-top: 12px; }
.mt16 { margin-top: 16px; }
/* scrollbar */
::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>
<div id="app">
  <div class="header" id="header">
    <button class="header-action back-btn" id="back-btn" style="display:none" onclick="goBack()">
      <i class="ri-arrow-right-line"></i>
    </button>
    <div class="header-title" id="header-title">منصة الدراسة</div>
    <button class="header-action" onclick="toggleTheme()" id="theme-btn" title="تبديل الثيم">
      <i class="ri-moon-line" id="theme-icon"></i>
    </button>
  </div>
  <div class="page" id="page-content"></div>
  <nav class="bottom-nav" id="bottom-nav">
    <button class="nav-item" data-page="home" onclick="nav('home')">
      <i class="ri-home-5-line"></i>الرئيسية
    </button>
    <button class="nav-item" data-page="subjects" onclick="nav('subjects')">
      <i class="ri-book-open-line"></i>المواد
    </button>
    <button class="nav-item" data-page="schedule" onclick="nav('schedule')">
      <i class="ri-calendar-2-line"></i>الجدول
    </button>
    <button class="nav-item" data-page="stats" onclick="nav('stats')">
      <i class="ri-bar-chart-2-line"></i>الإحصاء
    </button>
  </nav>
</div>
<div id="toast"></div>

<script src="data.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════════════════
//  STORE — LocalStorage wrapper
// ═══════════════════════════════════════════════════════
const LS = {
  get: (k, def) => { try { const v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : def; } catch { return def; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
};

const KEY_PROGRESS  = 'sp_progress';
const KEY_NOTES     = 'sp_notes';
const KEY_EXERCISES = 'sp_exercises';
const KEY_ACTIVITY  = 'sp_activity';
const KEY_TIMER     = 'sp_timer';
const KEY_SCHEDULE  = 'sp_schedule';
const KEY_THEME     = 'sp_theme';

// ═══════════════════════════════════════════════════════
//  THEME
// ═══════════════════════════════════════════════════════
let currentTheme = LS.get(KEY_THEME, 'dark');
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  const icon = document.getElementById('theme-icon');
  if (icon) icon.className = t === 'dark' ? 'ri-moon-line' : 'ri-sun-line';
}
function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  LS.set(KEY_THEME, currentTheme);
  applyTheme(currentTheme);
}
applyTheme(currentTheme);

// ═══════════════════════════════════════════════════════
//  DATA HELPERS
// ═══════════════════════════════════════════════════════
function getAllPartials() {
  const all = [];
  STUDY_DATA.forEach(cat => cat.subjects.forEach(subj =>
    subj.units.forEach(unit => unit.lessons.forEach(lesson =>
      lesson.branches.forEach(branch => branch.partials.forEach(p =>
        all.push({ ...p, branchId: branch.id, branchTitle: branch.title, lessonTitle: lesson.title, unitTitle: unit.title, subjectTitle: subj.title, subjectId: subj.id, catTitle: cat.title })
      ))
    ))
  ));
  return all;
}
function getAllBranches() {
  const all = [];
  STUDY_DATA.forEach(cat => cat.subjects.forEach(subj =>
    subj.units.forEach(unit => unit.lessons.forEach(lesson =>
      lesson.branches.forEach(branch =>
        all.push({ ...branch, lessonTitle: lesson.title, unitTitle: unit.title, subjectTitle: subj.title, subjectId: subj.id, catTitle: cat.title })
      )
    ))
  ));
  return all;
}
function findBranch(id) { return getAllBranches().find(b => b.id === id); }
function getBranchPartials(branchId) { return getAllPartials().filter(p => p.branchId === branchId); }

function getProgress() { return LS.get(KEY_PROGRESS, {}); }
function setPartialProgress(pid, data) {
  const p = getProgress();
  p[pid] = { ...(p[pid] || {}), ...data };
  LS.set(KEY_PROGRESS, p);
}
function isCompleted(pid) { return !!(getProgress()[pid] || {}).completed; }
function getReviewCount(pid) { return ((getProgress()[pid] || {}).reviewCount) || 0; }

function getNotes(pid) { return (LS.get(KEY_NOTES, {}))[pid] || ''; }
function setNotes(pid, text) {
  const n = LS.get(KEY_NOTES, {});
  n[pid] = text;
  LS.set(KEY_NOTES, n);
}
function getExercises(pid) { return (LS.get(KEY_EXERCISES, {}))[pid] || []; }
function setExercises(pid, exs) {
  const e = LS.get(KEY_EXERCISES, {});
  e[pid] = exs;
  LS.set(KEY_EXERCISES, e);
}

function calcSubjectProgress(subjectId) {
  const allP = getAllPartials().filter(p => p.subjectId === subjectId);
  if (!allP.length) return 0;
  const done = allP.filter(p => isCompleted(p.id)).length;
  return Math.round((done / allP.length) * 100);
}
function calcBranchProgress(branchId) {
  const ps = getBranchPartials(branchId);
  if (!ps.length) return 0;
  const done = ps.filter(p => isCompleted(p.id)).length;
  return { done, total: ps.length, pct: Math.round((done / ps.length) * 100) };
}
function calcOverallProgress() {
  const all = getAllPartials();
  if (!all.length) return { done: 0, total: 0, pct: 0 };
  const done = all.filter(p => isCompleted(p.id)).length;
  return { done, total: all.length, pct: Math.round((done / all.length) * 100) };
}
function totalReviews() {
  const p = getProgress();
  return Object.values(p).reduce((s, v) => s + (v.reviewCount || 0), 0);
}
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

const SUBJ_META = {
  'subj-physics':      { icon: 'ri-flashlight-line',  color: '#f59e0b', bg: 'rgba(245,158,11,0.15)' },
  'subj-chem':         { icon: 'ri-flask-line',        color: '#ef4444', bg: 'rgba(239,68,68,0.12)' },
  'subj-maths':        { icon: 'ri-functions',         color: '#3b82f6', bg: 'rgba(59,130,246,0.12)' },
  'subj-svt':          { icon: 'ri-leaf-line',         color: '#22c55e', bg: 'rgba(34,197,94,0.12)' },
  'subj-philo':        { icon: 'ri-mind-map',          color: '#8b5cf6', bg: 'rgba(139,92,246,0.12)' },
  'subj-english':      { icon: 'ri-translate-2',       color: '#06b6d4', bg: 'rgba(6,182,212,0.12)' },
  'subj-french':       { icon: 'ri-quill-pen-line',    color: '#ec4899', bg: 'rgba(236,72,153,0.12)' },
  'subj-islamic':      { icon: 'ri-moon-fill',         color: '#10b981', bg: 'rgba(16,185,129,0.12)' },
  'subj-arabic':       { icon: 'ri-pen-nib-line',      color: '#f97316', bg: 'rgba(249,115,22,0.12)' },
  'subj-history-geo':  { icon: 'ri-map-2-line',        color: '#84cc16', bg: 'rgba(132,204,22,0.12)' },
};
function subjMeta(id) { return SUBJ_META[id] || { icon: 'ri-book-line', color: '#6c63ff', bg: 'rgba(108,99,255,0.15)' }; }

// ═══════════════════════════════════════════════════════
//  ROUTER
// ═══════════════════════════════════════════════════════
let currentPage = 'home';
let historyStack = [];
let timerInterval = null;
let timerSeconds = 0;
let timerRunning = false;

function nav(page, push = true) {
  console.log('nav to', page);
  if (push && currentPage !== page) historyStack.push(currentPage);
  currentPage = page;
  updateNav(page);
  renderPage(page);
}
function goBack() {
  const prev = historyStack.pop();
  if (prev) nav(prev, false);
  else nav('home', false);
}
function updateNav(page) {
  document.querySelectorAll('.nav-item').forEach(b => {
    b.classList.toggle('active', b.dataset.page === page);
  });
  const mainPages = ['home','subjects','schedule','stats'];
  const isMain = mainPages.includes(page);
  document.getElementById('back-btn').style.display = isMain ? 'none' : '';
  const titles = { home: 'منصة الدراسة', subjects: 'المواد الدراسية', schedule: 'جدول المراجعة', stats: 'الإحصائيات' };
  if (page.startsWith('branch:')) {
    const branch = findBranch(page.replace('branch:', ''));
    document.getElementById('header-title').textContent = branch ? branch.title : 'الفرع';
  } else {
    document.getElementById('header-title').textContent = titles[page] || 'منصة الدراسة';
  }
}

// ═══════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════════════════════
//  RENDER ENGINE
// ═══════════════════════════════════════════════════════
function renderPage(page) {
  const container = document.getElementById('page-content');
  if (!container) return;
  container.scrollTop = 0;
  try {
    if (page === 'home')              container.innerHTML = renderHome();
    else if (page === 'subjects')     container.innerHTML = renderSubjects();
    else if (page === 'schedule')     container.innerHTML = renderSchedule();
    else if (page === 'stats')        container.innerHTML = renderStats();
    else if (page.startsWith('branch:')) {
      container.innerHTML = renderBranch(page.replace('branch:', ''));
      initBranchEvents();
    }
  } catch (e) {
    console.error('خطأ في عرض الصفحة:', e);
    container.innerHTML = '<div class="page-inner"><p>حدث خطأ أثناء تحميل الصفحة.</p></div>';
  }
  if (page === 'home') initTimerDisplay();
}

// ═══════════════════════════════════════════════════════
//  HOME PAGE
// ═══════════════════════════════════════════════════════
function renderHome() {
  const overall = calcOverallProgress();
  const r = 35, c = 2 * Math.PI * r;
  const offset = c - (overall.pct / 100) * c;
  const timerData = LS.get(KEY_TIMER, { total: 0 });
  const timerTotal = timerData.total;
  const activity = LS.get(KEY_ACTIVITY, {});
  const todayMin = activity[todayKey()] || 0;

  const allBranches = getAllBranches();
  const prog = getProgress();
  const recentBranches = allBranches.filter(b => {
    return b.partials.some(p => prog[p.id]);
  }).slice(0, 5);

  return `
  <div class="page-inner">
    <div class="home-hero">
      <div class="home-hero-label">مرحباً — باك مغرب ${new Date().getFullYear()}</div>
      <div class="home-hero-title">تقدمك الدراسي</div>
      <div class="home-hero-progress">
        <div class="progress-ring-wrap">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle class="progress-ring-bg" cx="40" cy="40" r="${r}"/>
            <circle class="progress-ring-fill" cx="40" cy="40" r="${r}"
              stroke-dasharray="${c}" stroke-dashoffset="${offset}"/>
          </svg>
          <div class="progress-ring-text">
            <span>${overall.pct}%</span>
            <span class="progress-ring-sub">مكتمل</span>
          </div>
        </div>
        <div class="home-hero-stats">
          <div class="home-hero-stat"><span>الجزئيات المنجزة</span><strong>${overall.done}/${overall.total}</strong></div>
          <div class="home-hero-stat"><span>المراجعات</span><strong>${totalReviews()}</strong></div>
          <div class="home-hero-stat"><span>وقت اليوم</span><strong>${todayMin} د</strong></div>
          <div class="home-hero-stat"><span>الوقت الإجمالي</span><strong>${Math.round(timerTotal/60)} د</strong></div>
        </div>
      </div>
    </div>

    <div class="timer-section">
      <div>
        <div style="font-size:12px;color:var(--text3);margin-bottom:2px">مؤقت الدراسة</div>
        <div class="timer-display" id="timer-disp">00:00:00</div>
      </div>
      <button class="timer-btn reset" id="btn-reset" onclick="resetTimer()" title="إعادة ضبط">
        <i class="ri-restart-line"></i>
      </button>
      <button class="timer-btn start" id="btn-startstop" onclick="toggleTimer()">
        <i class="ri-play-fill" id="timer-icon"></i>
      </button>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-card-icon" style="color:var(--accent)"><i class="ri-book-open-line"></i></div>
        <div class="stat-card-val">${STUDY_DATA.reduce((s,c)=>s+c.subjects.length,0)}</div>
        <div class="stat-card-lbl">المادة</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-icon" style="color:var(--green)"><i class="ri-checkbox-circle-line"></i></div>
        <div class="stat-card-val">${overall.done}</div>
        <div class="stat-card-lbl">جزئية مكتملة</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-icon" style="color:var(--yellow)"><i class="ri-restart-line"></i></div>
        <div class="stat-card-val">${totalReviews()}</div>
        <div class="stat-card-lbl">مراجعة</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-icon" style="color:var(--blue)"><i class="ri-time-line"></i></div>
        <div class="stat-card-val">${Math.round(timerTotal/3600)}</div>
        <div class="stat-card-lbl">ساعة دراسة</div>
      </div>
    </div>

    ${recentBranches.length ? `
    <div class="section-title">آخر ما درسته</div>
    <div class="recent-list">
      ${recentBranches.map(b => {
        const meta = subjMeta(b.subjectId);
        const bp = calcBranchProgress(b.id);
        return `
        <div class="recent-item" onclick="nav('branch:${b.id}')">
          <div class="recent-item-icon" style="background:${meta.bg};color:${meta.color}">
            <i class="${meta.icon}"></i>
          </div>
          <div class="recent-item-info">
            <div class="recent-item-title">${b.title}</div>
            <div class="recent-item-sub">${b.subjectTitle} · ${bp.done}/${bp.total} جزئية</div>
          </div>
          <i class="ri-arrow-left-s-line" style="color:var(--text3);font-size:18px"></i>
        </div>`;
      }).join('')}
    </div>` : `
    <div class="empty-state">
      <i class="ri-book-open-line"></i>
      <p>ابدأ بالمذاكرة من قائمة المواد</p>
    </div>`}
  </div>`;
}

// ═══════════════════════════════════════════════════════
//  TIMER
// ═══════════════════════════════════════════════════════
function initTimerDisplay() {
  const saved = LS.get(KEY_TIMER, { total: 0 });
  timerSeconds = 0;
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const el = document.getElementById('timer-disp');
  const icon = document.getElementById('timer-icon');
  const btn = document.getElementById('btn-startstop');
  if (!el) return;
  const h = String(Math.floor(timerSeconds/3600)).padStart(2,'0');
  const m = String(Math.floor((timerSeconds%3600)/60)).padStart(2,'0');
  const s = String(timerSeconds%60).padStart(2,'0');
  el.textContent = `${h}:${m}:${s}`;
  if (icon) icon.className = timerRunning ? 'ri-pause-fill' : 'ri-play-fill';
  if (btn) btn.className = timerRunning ? 'timer-btn pause' : 'timer-btn start';
}

function toggleTimer() {
  timerRunning = !timerRunning;
  if (timerRunning) {
    timerInterval = setInterval(() => {
      timerSeconds++;
      updateTimerDisplay();
      if (timerSeconds % 30 === 0) saveTimerActivity();
    }, 1000);
  } else {
    clearInterval(timerInterval);
    saveTimerActivity();
    timerSeconds = 0;
  }
  updateTimerDisplay();
}

function resetTimer() {
  clearInterval(timerInterval);
  if (timerRunning) saveTimerActivity();
  timerRunning = false;
  timerSeconds = 0;
  updateTimerDisplay();
}

function saveTimerActivity() {
  const saved = LS.get(KEY_TIMER, { total: 0 });
  saved.total = (saved.total || 0) + timerSeconds;
  LS.set(KEY_TIMER, saved);
  const act = LS.get(KEY_ACTIVITY, {});
  const today = todayKey();
  act[today] = (act[today] || 0) + Math.ceil(timerSeconds / 60);
  LS.set(KEY_ACTIVITY, act);
  timerSeconds = 0;
}

// ═══════════════════════════════════════════════════════
//  SUBJECTS PAGE
// ═══════════════════════════════════════════════════════
let searchQuery = '';
function renderSubjects(query) {
  if (query !== undefined) searchQuery = query;
  const q = searchQuery.toLowerCase().trim();
  return `
  <div class="page-inner">
    <div class="search-bar">
      <i class="ri-search-line"></i>
      <input type="search" placeholder="ابحث عن مادة أو درس..." value="${escHtml(searchQuery)}"
        oninput="document.getElementById('page-content').innerHTML=renderSubjects(this.value)" />
    </div>
    ${STUDY_DATA.map(cat => renderCategory(cat, q)).join('')}
  </div>`;
}
function renderCategory(cat, q) {
  const subjects = cat.subjects.filter(subj => {
    if (!q) return true;
    return subj.title.toLowerCase().includes(q) ||
      subj.units.some(u => u.title.toLowerCase().includes(q) ||
        u.lessons.some(l => l.title.toLowerCase().includes(q) ||
          l.branches.some(b => b.title.toLowerCase().includes(q))
        )
      );
  });
  if (!subjects.length) return '';
  const totalP = subjects.reduce((s,subj)=>s+subj.units.reduce((s2,u)=>s2+u.lessons.reduce((s3,l)=>s3+l.branches.reduce((s4,b)=>s4+b.partials.length,0),0),0),0);
  const doneP = subjects.reduce((s,subj)=>s+subj.units.reduce((s2,u)=>s2+u.lessons.reduce((s3,l)=>s3+l.branches.reduce((s4,b)=>s4+b.partials.filter(p=>isCompleted(p.id)).length,0),0),0),0);
  return `
  <div class="category-block">
    <div class="category-header">
      <i class="ri-folder-line" style="font-size:20px"></i>
      <span class="category-header-text">${escHtml(cat.title)}</span>
      <span class="category-badge">${doneP}/${totalP}</span>
    </div>
    ${subjects.map(subj => renderSubject(subj, q)).join('')}
  </div>`;
}
function renderSubject(subj, q) {
  const meta = subjMeta(subj.id);
  const pct = calcSubjectProgress(subj.id);
  const allP = subj.units.reduce((s,u)=>s+u.lessons.reduce((s2,l)=>s2+l.branches.reduce((s3,b)=>s3+b.partials.length,0),0),0);
  const doneP = subj.units.reduce((s,u)=>s+u.lessons.reduce((s2,l)=>s2+l.branches.reduce((s3,b)=>s3+b.partials.filter(p=>isCompleted(p.id)).length,0),0),0);
  const expanded = q && q.length > 0;
  return `
  <div class="subject-card">
    <div class="subject-header" onclick="toggleExpand(this)">
      <div class="subject-icon" style="background:${meta.bg};color:${meta.color}">
        <i class="${meta.icon}"></i>
      </div>
      <div class="subject-info">
        <div class="subject-name">${escHtml(subj.title)}</div>
        <div class="subject-progress">${doneP}/${allP} جزئية · ${pct}%</div>
      </div>
      <i class="ri-arrow-left-s-line subject-chevron ${expanded?'open':''}"></i>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" style="width:${pct}%"></div>
    </div>
    <div class="subject-body ${expanded?'open':''}">
      ${subj.units.map(unit => renderUnit(unit, q)).join('')}
    </div>
  </div>`;
}
function renderUnit(unit, q) {
  const expanded = q && q.length > 0;
  return `
  <div class="unit-block">
    <div class="unit-header" onclick="toggleExpand(this)">
      <i class="ri-arrow-left-s-line unit-chevron ${expanded?'open':''}"></i>
      <span class="unit-title">${escHtml(unit.title)}</span>
    </div>
    <div class="unit-body ${expanded?'open':''}">
      ${unit.lessons.map(lesson => renderLesson(lesson, q)).join('')}
    </div>
  </div>`;
}
function renderLesson(lesson, q) {
  return `
  <div class="lesson-item">
    <div class="lesson-title"><i class="ri-book-2-line"></i>${escHtml(lesson.title)}</div>
    ${lesson.branches.map(branch => renderBranchItem(branch)).join('')}
  </div>`;
}
function renderBranchItem(branch) {
  const ps = branch.partials;
  const done = ps.filter(p => isCompleted(p.id)).length;
  const isDone = done === ps.length && ps.length > 0;
  const isPartial = done > 0 && done < ps.length;
  return `
  <div class="branch-item" onclick="nav('branch:${branch.id}')">
    <div class="branch-dot ${isDone?'done':isPartial?'partial':''}"></div>
    <span class="branch-name">${escHtml(branch.title)}</span>
    <span class="branch-count">${done}/${ps.length}</span>
    <i class="ri-arrow-left-s-line branch-arrow"></i>
  </div>`;
}
function toggleExpand(header) {
  const chevron = header.querySelector('.subject-chevron,.unit-chevron');
  let bodyEl;
  if (header.classList.contains('subject-header')) {
    bodyEl = header.parentElement.querySelector('.subject-body');
  } else {
    bodyEl = header.parentElement.querySelector('.unit-body');
  }
  if (!bodyEl) return;
  const isOpen = bodyEl.classList.contains('open');
  bodyEl.classList.toggle('open', !isOpen);
  if (chevron) chevron.classList.toggle('open', !isOpen);
}

// ═══════════════════════════════════════════════════════
//  BRANCH VIEW
// ═══════════════════════════════════════════════════════
function renderBranch(branchId) {
  const branch = findBranch(branchId);
  if (!branch) return '<div class="page-inner"><p>الفرع غير موجود</p></div>';
  const bp = calcBranchProgress(branchId);
  return `
  <div class="page-inner">
    <div class="branch-header-card">
      <div class="branch-breadcrumb">${escHtml(branch.catTitle)} / ${escHtml(branch.subjectTitle)} / ${escHtml(branch.unitTitle)} / ${escHtml(branch.lessonTitle)}</div>
      <div class="branch-main-title">${escHtml(branch.title)}</div>
      <div class="branch-progress-row">
        <div class="branch-progress-bar">
          <div class="progress-bar-fill" style="width:${bp.pct}%"></div>
        </div>
        <span class="branch-progress-val">${bp.done}/${bp.total}</span>
      </div>
    </div>
    <div class="partial-list" id="partial-list">
      ${branch.partials.map((p, i) => renderPartialCard(p, i)).join('')}
    </div>
  </div>`;
}
function renderPartialCard(p, i) {
  const done = isCompleted(p.id);
  const rc = getReviewCount(p.id);
  return `
  <div class="partial-card ${done?'completed':''}" id="pc-${p.id}">
    <div class="partial-header" onclick="togglePartial('${p.id}')">
      <div class="partial-check ${done?'done':''}" id="chk-${p.id}">
        ${done ? '<i class="ri-check-line"></i>' : ''}
      </div>
      <div class="partial-info">
        <div class="partial-title">${escHtml(p.title)}</div>
        <div class="partial-meta">
          ${done ? `<span class="chip chip-green"><i class="ri-check-line"></i> مكتمل</span>` : '<span class="chip chip-accent"><i class="ri-time-line"></i> قيد الدراسة</span>'}
          ${rc > 0 ? `<span class="chip chip-yellow"><i class="ri-restart-line"></i> ${rc} مراجعات</span>` : ''}
        </div>
      </div>
      <i class="ri-arrow-down-s-line" id="chevron-${p.id}" style="color:var(--text3);font-size:20px;transition:transform 0.2s"></i>
    </div>
    <div class="partial-body" id="pb-${p.id}">
      <div class="tab-bar">
        <button class="tab-btn active" id="tab-notes-${p.id}" onclick="switchTab('${p.id}','notes')">
          <i class="ri-file-text-line"></i> ملاحظات
        </button>
        <button class="tab-btn" id="tab-exercises-${p.id}" onclick="switchTab('${p.id}','exercises')">
          <i class="ri-todo-line"></i> تمارين
        </button>
        <button class="tab-btn" id="tab-review-${p.id}" onclick="switchTab('${p.id}','review')">
          <i class="ri-restart-line"></i> مراجعة
        </button>
      </div>
      <div id="tab-content-${p.id}">
        ${renderNotesTab(p.id)}
      </div>
      <div class="complete-btn-wrap">
        <button class="complete-btn ${done?'done':'undone'}" id="cbtn-${p.id}" onclick="toggleComplete('${p.id}')">
          ${done ? `<i class="ri-checkbox-circle-fill"></i> إلغاء الإكمال` : `<i class="ri-checkbox-circle-line"></i> تحديد كمكتملة`}
        </button>
      </div>
    </div>
  </div>`;
}
function renderNotesTab(pid) {
  const notes = getNotes(pid);
  return `
  <div class="content-area" id="notes-area-${pid}">
    <textarea class="notes-textarea" id="notes-ta-${pid}" placeholder="أضف ملاحظاتك هنا...">${escHtml(notes)}</textarea>
    <button class="save-notes-btn" onclick="saveNotes('${pid}')"><i class="ri-save-line"></i> حفظ</button>
  </div>`;
}
function renderExercisesTab(pid) {
  const exs = getExercises(pid);
  return `
  <div class="exercises-area" id="exs-area-${pid}">
    ${exs.length ? exs.map((ex, i) => `
    <div class="exercise-item" id="ex-${pid}-${i}">
      <div class="exercise-check ${ex.done?'done':''}" onclick="toggleExercise('${pid}',${i})">
        ${ex.done ? '<i class="ri-check-line"></i>' : ''}
      </div>
      <div class="exercise-text" style="${ex.done?'text-decoration:line-through;opacity:0.5':''}">${escHtml(ex.text)}</div>
      <button style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px" onclick="deleteExercise('${pid}',${i})">
        <i class="ri-delete-bin-line"></i>
      </button>
    </div>`).join('') : '<p style="font-size:13px;color:var(--text3);text-align:center;padding:16px">لا تمارين مضافة</p>'}
    <div class="add-exercise-row">
      <input class="add-exercise-input" id="ex-input-${pid}" placeholder="أضف تمريناً جديداً..." onkeydown="if(event.key==='Enter')addExercise('${pid}')"/>
      <button class="add-exercise-btn" onclick="addExercise('${pid}')"><i class="ri-add-line"></i></button>
    </div>
  </div>`;
}
function renderReviewTab(pid) {
  const rc = getReviewCount(pid);
  return `
  <div class="review-section">
    <div class="review-count">مراجعات: <strong>${rc}</strong></div>
    <button class="review-btn" onclick="addReview('${pid}')">
      <i class="ri-restart-line"></i> سجّل مراجعة
    </button>
  </div>`;
}
function initBranchEvents() { /* events are inline onclick */ }

function togglePartial(pid) {
  const body = document.getElementById('pb-' + pid);
  const chevron = document.getElementById('chevron-' + pid);
  if (!body) return;
  const isOpen = body.classList.contains('open');
  document.querySelectorAll('.partial-body.open').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('[id^="chevron-"]').forEach(el => el.style.transform = '');
  if (!isOpen) {
    body.classList.add('open');
    if (chevron) chevron.style.transform = 'rotate(180deg)';
  }
}
function switchTab(pid, tab) {
  ['notes','exercises','review'].forEach(t => {
    const btn = document.getElementById(`tab-${t}-${pid}`);
    if (btn) btn.classList.toggle('active', t === tab);
  });
  const area = document.getElementById('tab-content-' + pid);
  if (!area) return;
  if (tab === 'notes') area.innerHTML = renderNotesTab(pid);
  else if (tab === 'exercises') area.innerHTML = renderExercisesTab(pid);
  else if (tab === 'review') area.innerHTML = renderReviewTab(pid);
}
function saveNotes(pid) {
  const ta = document.getElementById('notes-ta-' + pid);
  if (!ta) return;
  setNotes(pid, ta.value);
  showToast('✓ تم حفظ الملاحظات');
}
function addExercise(pid) {
  const input = document.getElementById('ex-input-' + pid);
  if (!input || !input.value.trim()) return;
  const exs = getExercises(pid);
  exs.push({ text: input.value.trim(), done: false });
  setExercises(pid, exs);
  switchTab(pid, 'exercises');
  showToast('✓ تمت إضافة التمرين');
}
function toggleExercise(pid, idx) {
  const exs = getExercises(pid);
  if (!exs[idx]) return;
  exs[idx].done = !exs[idx].done;
  setExercises(pid, exs);
  switchTab(pid, 'exercises');
}
function deleteExercise(pid, idx) {
  const exs = getExercises(pid);
  exs.splice(idx, 1);
  setExercises(pid, exs);
  switchTab(pid, 'exercises');
}
function addReview(pid) {
  const rc = getReviewCount(pid);
  setPartialProgress(pid, { reviewCount: rc + 1 });
  switchTab(pid, 'review');
  showToast('✓ تمت إضافة مراجعة');
}
function toggleComplete(pid) {
  const done = isCompleted(pid);
  setPartialProgress(pid, { completed: !done });
  const card = document.getElementById('pc-' + pid);
  const chk = document.getElementById('chk-' + pid);
  const cbtn = document.getElementById('cbtn-' + pid);
  if (card) card.classList.toggle('completed', !done);
  if (chk) {
    chk.className = 'partial-check ' + (!done ? 'done' : '');
    chk.innerHTML = !done ? '<i class="ri-check-line"></i>' : '';
  }
  if (cbtn) {
    cbtn.className = 'complete-btn ' + (!done ? 'done' : 'undone');
    cbtn.innerHTML = !done
      ? '<i class="ri-checkbox-circle-fill"></i> إلغاء الإكمال'
      : '<i class="ri-checkbox-circle-line"></i> تحديد كمكتملة';
  }
  showToast(!done ? '✓ تم تحديدها كمكتملة' : '✓ تم إلغاء الإكمال');
  const act = LS.get(KEY_ACTIVITY, {});
  const today = todayKey();
  act[today] = (act[today] || 0) + 2;
  LS.set(KEY_ACTIVITY, act);
}

// ═══════════════════════════════════════════════════════
//  SCHEDULE PAGE
// ═══════════════════════════════════════════════════════
let selectedDay = todayKey();
function renderSchedule() {
  const today = new Date();
  const dayNames = ['أحد','اثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'];
  const schedule = LS.get(KEY_SCHEDULE, {});

  const days = [];
  for (let i = -3; i <= 3; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    days.push({ key, dayName: dayNames[d.getDay()], dayNum: d.getDate(), isToday: i === 0, hasSessions: !!(schedule[key] && schedule[key].length) });
  }

  const allSubjects = STUDY_DATA.flatMap(cat => cat.subjects);
  const sessions = schedule[selectedDay] || [];

  return `
  <div class="page-inner">
    <div class="section-title">الأسبوع الحالي</div>
    <div class="week-grid" id="week-grid">
      ${days.map(d => `
      <div class="day-cell ${d.isToday?'today':''} ${d.key===selectedDay?'active':''} ${d.hasSessions?'has-sessions':''}"
        onclick="selectDay('${d.key}')">
        <div class="day-name">${d.dayName}</div>
        <div class="day-num">${d.dayNum}</div>
        <div class="day-dot"></div>
      </div>`).join('')}
    </div>

    <div class="session-add-card">
      <div class="session-add-title"><i class="ri-add-circle-line"></i> إضافة جلسة دراسة</div>
      <div class="session-add-row">
        <select class="session-select" id="sess-subj">
          ${allSubjects.map(s => `<option value="${s.id}">${s.title}</option>`).join('')}
        </select>
        <input type="time" class="session-time-input" id="sess-time" value="09:00">
      </div>
      <div style="margin-top:8px">
        <input type="text" class="add-exercise-input" id="sess-note" placeholder="ملاحظة اختيارية..." style="width:100%">
      </div>
      <div style="margin-top:8px">
        <button class="session-add-submit" onclick="addSession()"><i class="ri-add-line"></i> إضافة</button>
      </div>
    </div>

    <div class="section-title">جلسات ${selectedDay}</div>
    <div class="sessions-container" id="sessions-cont">
      ${renderSessionsList(sessions)}
    </div>
  </div>`;
}
function renderSessionsList(sessions) {
  if (!sessions.length) return `
  <div class="empty-state">
    <i class="ri-calendar-check-line"></i>
    <p>لا جلسات مضافة لهذا اليوم</p>
  </div>`;
  return sessions.map((s, i) => {
    const meta = subjMeta(s.subjectId);
    const subj = STUDY_DATA.flatMap(c=>c.subjects).find(x=>x.id===s.subjectId);
    return `
    <div class="session-card">
      <div class="session-time-badge">${s.time}</div>
      <div class="session-info">
        <div class="session-subject" style="color:${meta.color}">${subj ? subj.title : s.subjectId}</div>
        ${s.note ? `<div class="session-detail">${escHtml(s.note)}</div>` : ''}
      </div>
      <button class="session-del" onclick="deleteSession(${i})"><i class="ri-delete-bin-line"></i></button>
    </div>`;
  }).join('');
}
function selectDay(key) {
  selectedDay = key;
  document.getElementById('page-content').innerHTML = renderSchedule();
}
function addSession() {
  const subjEl = document.getElementById('sess-subj');
  const timeEl = document.getElementById('sess-time');
  const noteEl = document.getElementById('sess-note');
  if (!subjEl || !timeEl) return;
  const schedule = LS.get(KEY_SCHEDULE, {});
  if (!schedule[selectedDay]) schedule[selectedDay] = [];
  schedule[selectedDay].push({ subjectId: subjEl.value, time: timeEl.value, note: noteEl ? noteEl.value : '' });
  schedule[selectedDay].sort((a,b) => a.time.localeCompare(b.time));
  LS.set(KEY_SCHEDULE, schedule);
  document.getElementById('page-content').innerHTML = renderSchedule();
  showToast('✓ تمت إضافة الجلسة');
}
function deleteSession(idx) {
  const schedule = LS.get(KEY_SCHEDULE, {});
  if (schedule[selectedDay]) {
    schedule[selectedDay].splice(idx, 1);
    LS.set(KEY_SCHEDULE, schedule);
    document.getElementById('page-content').innerHTML = renderSchedule();
  }
}

// ═══════════════════════════════════════════════════════
//  STATS PAGE
// ═══════════════════════════════════════════════════════
function renderStats() {
  const overall = calcOverallProgress();
  const timerData = LS.get(KEY_TIMER, { total: 0 });
  const timerTotal = timerData.total;
  const activity = LS.get(KEY_ACTIVITY, {});
  const todayMin = activity[todayKey()] || 0;

  const allSubjects = STUDY_DATA.flatMap(cat => cat.subjects);

  const today = new Date();
  const heatCells = [];
  for (let i = 90; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const min = activity[key] || 0;
    const lvl = min === 0 ? 0 : min < 30 ? 1 : min < 60 ? 2 : min < 120 ? 3 : 4;
    heatCells.push(`<div class="heat-cell" data-lvl="${lvl}" title="${key}: ${Math.round(min)}د"></div>`);
  }

  return `
  <div class="page-inner">
    <div class="stats-hero-row">
      <div class="stats-mini">
        <div class="stats-mini-val text-accent">${overall.pct}%</div>
        <div class="stats-mini-lbl">الإنجاز العام</div>
      </div>
      <div class="stats-mini">
        <div class="stats-mini-val text-green">${overall.done}</div>
        <div class="stats-mini-lbl">جزئيات</div>
      </div>
      <div class="stats-mini">
        <div class="stats-mini-val" style="color:var(--yellow)">${Math.round(timerTotal/3600)}</div>
        <div class="stats-mini-lbl">ساعات</div>
      </div>
    </div>

    <div class="section-title">تقدم المواد</div>
    <div class="subjects-progress">
      ${allSubjects.map(subj => {
        const pct = calcSubjectProgress(subj.id);
        const meta = subjMeta(subj.id);
        const allP = subj.units.reduce((s,u)=>s+u.lessons.reduce((s2,l)=>s2+l.branches.reduce((s3,b)=>s3+b.partials.length,0),0),0);
        const doneP = subj.units.reduce((s,u)=>s+u.lessons.reduce((s2,l)=>s2+l.branches.reduce((s3,b)=>s3+b.partials.filter(p=>isCompleted(p.id)).length,0),0),0);
        return `
        <div class="subj-progress-item">
          <div class="subj-progress-top">
            <span class="subj-progress-name">
              <i class="${meta.icon}" style="color:${meta.color};margin-left:6px"></i>
              ${escHtml(subj.title)}
            </span>
            <span class="subj-progress-pct">${pct}%</span>
          </div>
          <div class="progress-bar-wrap" style="height:8px;border-radius:4px">
            <div class="progress-bar-fill" style="width:${pct}%;background:${meta.color};border-radius:4px"></div>
          </div>
          <div style="font-size:11px;color:var(--text3);margin-top:4px">${doneP}/${allP} جزئية</div>
        </div>`;
      }).join('')}
    </div>

    <div class="section-title">نشاط 91 يوماً الماضية</div>
    <div class="heatmap-grid">${heatCells.join('')}</div>
    <div class="heatmap-legend">
      <span>أقل</span>
      <div class="heatmap-legend-cell" style="background:var(--bg3)"></div>
      <div class="heatmap-legend-cell" data-lvl="1" style="background:rgba(108,99,255,0.25)"></div>
      <div class="heatmap-legend-cell" data-lvl="2" style="background:rgba(108,99,255,0.5)"></div>
      <div class="heatmap-legend-cell" data-lvl="3" style="background:rgba(108,99,255,0.75)"></div>
      <div class="heatmap-legend-cell" data-lvl="4" style="background:var(--accent)"></div>
      <span>أكثر</span>
    </div>

    <div class="divider"></div>
    <div class="section-title">ملخص الإنجاز</div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:14px">
        <span>الجزئيات المكتملة</span><strong>${overall.done} / ${overall.total}</strong>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:14px">
        <span>إجمالي المراجعات</span><strong>${totalReviews()}</strong>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:14px">
        <span>دقائق اليوم</span><strong>${Math.round(todayMin)}</strong>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:14px">
        <span>إجمالي ساعات الدراسة</span><strong>${Math.round(timerTotal/3600)} ساعة</strong>
      </div>
    </div>

    <div style="margin-top:16px;text-align:center">
      <button onclick="clearAllData()" style="background:var(--red-light);color:var(--red);border:1px solid var(--red);border-radius:var(--radius-sm);padding:10px 20px;font-family:inherit;font-size:13px;cursor:pointer;font-weight:600">
        <i class="ri-delete-bin-2-line"></i> إعادة تعيين كل البيانات
      </button>
    </div>
  </div>`;
}
function clearAllData() {
  if (confirm('هل أنت متأكد؟ سيتم حذف كل تقدمك وملاحظاتك!')) {
    [KEY_PROGRESS, KEY_NOTES, KEY_EXERCISES, KEY_ACTIVITY, KEY_TIMER, KEY_SCHEDULE].forEach(k => localStorage.removeItem(k));
    showToast('تم إعادة تعيين جميع البيانات');
    nav('home');
  }
}

// ═══════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
nav('home', false);
</script>
</body>
</html>

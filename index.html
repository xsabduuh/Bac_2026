<style>
:root {
  --bg: #0f0f13;
  --bg2: #18181f;
  --bg3: #22222d;
  --border: #2e2e3a;
  --text: #f0f0f5;
  --text2: #a0a0b8;
  --text3: #606078;
  --accent: #6c63ff;
  --accent2: #5a52e0;
  --accent-light: rgba(108,99,255,0.15);
  --green: #22c55e;
  --green-light: rgba(34,197,94,0.15);
  --yellow: #f59e0b;
  --yellow-light: rgba(245,158,11,0.12);
  --red: #ef4444;
  --red-light: rgba(239,68,68,0.12);
  --blue: #3b82f6;
  --radius: 14px;
  --radius-sm: 8px;
  --nav-h: 64px;
  --header-h: 56px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --transition: 0.2s ease;
}
[data-theme="light"] {
  --bg: #f5f5fa;
  --bg2: #ffffff;
  --bg3: #ededf5;
  --border: #e0e0ea;
  --text: #111118;
  --text2: #555568;
  --text3: #9090a8;
  --accent: #5b52f0;
  --accent2: #4a42df;
  --accent-light: rgba(91,82,240,0.1);
  --green: #16a34a;
  --green-light: rgba(22,163,74,0.1);
  --yellow: #d97706;
  --yellow-light: rgba(217,119,6,0.1);
  --red: #dc2626;
  --red-light: rgba(220,38,38,0.1);
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'IBM Plex Sans Arabic', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.5;
  transition: background var(--transition), color var(--transition);
}
#app {
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}
/* ── HEADER ── */
.header {
  height: var(--header-h);
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 10px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.header-title {
  flex: 1;
  font-weight: 700;
  font-size: 17px;
  color: var(--text);
}
.header-action {
  background: none;
  border: none;
  color: var(--text2);
  font-size: 22px;
  cursor: pointer;
  padding: 6px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s, transform 0.1s;
  will-change: transform;
}
.header-action:active {
  background: var(--bg3);
  transform: scale(0.85);
}
.back-btn { color: var(--accent); }
/* ── PAGE CONTENT ── */
.page {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding-bottom: calc(var(--nav-h) + 8px);
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}
.page-inner { padding: 16px; }
/* ── BOTTOM NAV ── */
.bottom-nav {
  height: var(--nav-h);
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 8px 0;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--text3);
  font-size: 11px;
  font-family: inherit;
  transition: color 0.2s, transform 0.15s, background 0.15s;
  border-radius: var(--radius-sm);
  will-change: transform;
}
.nav-item i { font-size: 22px; transition: transform 0.15s; }
.nav-item.active { color: var(--accent); }
.nav-item.active i { transform: scale(1.15); }
.nav-item:active {
  background: var(--bg3);
  transform: scale(0.9);
}
.nav-item:active i {
  transform: scale(0.85);
}
/* ── HOME PAGE ── */
.home-hero {
  background: linear-gradient(135deg, var(--accent) 0%, #9c5cf5 100%);
  border-radius: var(--radius);
  padding: 22px 20px;
  color: #fff;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.home-hero::after {
  content: '';
  position: absolute;
  top: -30px; left: -30px;
  width: 160px; height: 160px;
  background: rgba(255,255,255,0.06);
  border-radius: 50%;
}
.home-hero-label { font-size: 13px; opacity: 0.85; margin-bottom: 4px; }
.home-hero-title { font-size: 22px; font-weight: 700; margin-bottom: 16px; }
.home-hero-progress { display: flex; align-items: center; gap: 14px; }
.progress-ring-wrap { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
.progress-ring-wrap svg { transform: rotate(-90deg); }
.progress-ring-bg { fill: none; stroke: rgba(255,255,255,0.2); stroke-width: 7; }
.progress-ring-fill { fill: none; stroke: #fff; stroke-width: 7; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
.progress-ring-text {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-weight: 700; font-size: 15px;
  line-height: 1.1;
}
.progress-ring-sub { font-size: 10px; opacity: 0.8; }
.home-hero-stats { flex: 1; }
.home-hero-stat { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
.home-hero-stat strong { font-weight: 600; }
.section-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}
.stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
  cursor: default;
  will-change: transform;
}
.stat-card:active {
  transform: scale(0.95);
  box-shadow: 0 4px 14px rgba(0,0,0,0.25);
  background: var(--bg3);
}
.stat-card-icon { font-size: 22px; margin-bottom: 4px; }
.stat-card-val { font-size: 20px; font-weight: 700; }
.stat-card-lbl { font-size: 12px; color: var(--text3); }
.recent-list { display: flex; flex-direction: column; gap: 8px; }
.recent-item {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.15s, background 0.15s;
  will-change: transform;
}
.recent-item:active {
  border-color: var(--accent);
  background: var(--bg3);
  transform: scale(0.97);
}
.recent-item-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--accent-light);
  color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.recent-item-info { flex: 1; min-width: 0; }
.recent-item-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.recent-item-sub { font-size: 12px; color: var(--text3); }
/* ── SUBJECTS PAGE ── */
.search-bar {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-bar:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-light);
}
.search-bar i { color: var(--text3); font-size: 18px; }
.search-bar input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  font-family: inherit;
  font-size: 14px;
  color: var(--text);
  direction: rtl;
}
.search-bar input::placeholder { color: var(--text3); }
.category-block { margin-bottom: 16px; }
.category-header {
  background: linear-gradient(135deg, var(--accent) 0%, #9c5cf5 100%);
  color: #fff;
  border-radius: var(--radius);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  margin-bottom: 8px;
  transition: transform 0.15s, box-shadow 0.15s;
  will-change: transform;
}
.category-header:active {
  transform: scale(0.97);
  box-shadow: 0 6px 16px rgba(0,0,0,0.35);
}
.category-header-text { flex: 1; font-weight: 700; font-size: 16px; }
.category-badge {
  background: rgba(255,255,255,0.2);
  border-radius: 50px;
  padding: 2px 10px;
  font-size: 12px;
}
.subject-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  overflow: hidden;
  transition: border-color 0.2s, transform 0.15s;
}
.subject-card:active {
  transform: scale(0.99);
}
.subject-header {
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s, transform 0.15s;
}
.subject-header:active {
  background: var(--bg3);
  transform: scale(0.99);
}
.subject-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  transition: transform 0.15s;
}
.subject-header:active .subject-icon {
  transform: scale(0.85);
}
.subject-info { flex: 1; min-width: 0; }
.subject-name { font-weight: 600; font-size: 15px; }
.subject-progress { font-size: 12px; color: var(--text3); margin-top: 2px; }
.subject-chevron { color: var(--text3); font-size: 18px; transition: transform 0.2s; }
.subject-chevron.open { transform: rotate(90deg); }
.subject-body { display: none; border-top: 1px solid var(--border); }
.subject-body.open { display: block; }
.progress-bar-wrap { height: 4px; background: var(--bg3); }
.progress-bar-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.4s; }
.unit-block { border-bottom: 1px solid var(--border); }
.unit-block:last-child { border-bottom: none; }
.unit-header {
  padding: 10px 14px 10px 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s, transform 0.15s;
}
.unit-header:active {
  background: var(--bg2);
  transform: scale(0.99);
}
.unit-title { flex: 1; font-size: 14px; font-weight: 500; color: var(--text); }
.unit-chevron { color: var(--text3); font-size: 16px; transition: transform 0.2s; }
.unit-chevron.open { transform: rotate(90deg); }
.unit-body { display: none; background: var(--bg3); }
.unit-body.open { display: block; }
.lesson-item {
  border-bottom: 1px solid var(--border);
  padding: 8px 14px 8px 24px;
}
.lesson-item:last-child { border-bottom: none; }
.lesson-title { font-size: 13px; color: var(--text2); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.lesson-title i { color: var(--text3); font-size: 14px; }
.branch-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  margin: 4px 0;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.15s, transform 0.15s;
  will-change: transform;
}
.branch-item:active {
  background: var(--bg2);
  transform: scale(0.96);
}
.branch-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  border: 2px solid var(--border);
  background: var(--bg);
  transition: all var(--transition);
}
.branch-dot.done { background: var(--green); border-color: var(--green); }
.branch-dot.partial { background: var(--yellow); border-color: var(--yellow); }
.branch-name { flex: 1; font-size: 13px; color: var(--text2); }
.branch-count { font-size: 11px; color: var(--text3); }
.branch-arrow { color: var(--text3); font-size: 14px; transition: transform 0.15s; }
.branch-item:active .branch-arrow {
  transform: translateX(-4px);
}
/* ── BRANCH VIEW PAGE ── */
.branch-header-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
}
.branch-breadcrumb { font-size: 12px; color: var(--text3); margin-bottom: 6px; line-height: 1.4; }
.branch-main-title { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
.branch-progress-row { display: flex; align-items: center; gap: 10px; }
.branch-progress-bar { flex: 1; height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
.branch-progress-val { font-size: 13px; font-weight: 600; color: var(--accent); }
.partial-list { display: flex; flex-direction: column; gap: 10px; }
.partial-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
  transition: border-color 0.2s, transform 0.15s;
}
.partial-card:active {
  transform: scale(0.99);
}
.partial-card.completed { border-color: var(--green); }
.partial-header {
  padding: 14px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  cursor: pointer;
  transition: background 0.15s, transform 0.15s;
}
.partial-header:active {
  background: var(--bg3);
  transform: scale(0.99);
}
.partial-check {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
  margin-top: 1px;
}
.partial-check:active {
  transform: scale(0.8);
  background: var(--bg3);
}
.partial-check.done { background: var(--green); border-color: var(--green); color: #fff; }
.partial-check i { font-size: 13px; }
.partial-info { flex: 1; }
.partial-title { font-size: 14px; font-weight: 500; line-height: 1.4; }
.partial-meta { font-size: 12px; color: var(--text3); margin-top: 4px; display: flex; gap: 12px; }
.partial-body { display: none; border-top: 1px solid var(--border); padding: 14px; }
.partial-body.open { display: block; }
.tab-bar {
  display: flex;
  gap: 4px;
  background: var(--bg3);
  border-radius: var(--radius-sm);
  padding: 4px;
  margin-bottom: 12px;
}
.tab-btn {
  flex: 1;
  border: none;
  background: none;
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  color: var(--text3);
  padding: 6px 4px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s, transform 0.1s;
}
.tab-btn.active { background: var(--bg2); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
.tab-btn:active {
  background: var(--bg2);
  transform: scale(0.95);
}
.content-area {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.7;
}
.notes-textarea {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  font-family: inherit;
  font-size: 13px;
  color: var(--text);
  resize: vertical;
  min-height: 100px;
  outline: none;
  direction: rtl;
  transition: border-color 0.2s;
  line-height: 1.6;
}
.notes-textarea:focus { border-color: var(--accent); }
.save-notes-btn {
  margin-top: 8px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 8px 16px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}
.save-notes-btn:active {
  background: var(--accent2);
  transform: scale(0.95);
}
.exercises-area { display: flex; flex-direction: column; gap: 8px; }
.exercise-item {
  background: var(--bg3);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  display: flex;
  gap: 10px;
  align-items: flex-start;
  transition: transform 0.1s;
}
.exercise-item:active {
  transform: scale(0.99);
}
.exercise-check {
  width: 20px; height: 20px;
  border-radius: 4px;
  border: 2px solid var(--border);
  flex-shrink: 0;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  margin-top: 1px;
}
.exercise-check:active {
  transform: scale(0.8);
}
.exercise-check.done { background: var(--green); border-color: var(--green); color: #fff; }
.exercise-check i { font-size: 12px; }
.exercise-text { flex: 1; font-size: 13px; color: var(--text2); }
.add-exercise-row {
  display: flex; gap: 8px; margin-top: 4px;
}
.add-exercise-input {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-family: inherit;
  font-size: 13px;
  color: var(--text);
  outline: none;
  direction: rtl;
}
.add-exercise-input:focus { border-color: var(--accent); }
.add-exercise-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 8px 14px;
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}
.add-exercise-btn:active {
  background: var(--accent2);
  transform: scale(0.95);
}
.review-section { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.review-count { font-size: 13px; color: var(--text2); }
.review-count strong { color: var(--accent); font-size: 18px; }
.review-btn {
  background: var(--accent-light);
  color: var(--accent);
  border: 1px solid var(--accent);
  border-radius: var(--radius-sm);
  padding: 8px 16px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;

<script>
'use strict';

// ═══════════════════════════════════════════════════════
//  STORE
// ═══════════════════════════════════════════════════════
const LS = {
  get: (k, def) => { try { const v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : def; } catch { return def; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
};

const KEY_PROGRESS   = 'sp_progress';
const KEY_NOTES      = 'sp_notes';
const KEY_EXERCISES  = 'sp_exercises';
const KEY_ACTIVITY   = 'sp_activity';
const KEY_TIMER      = 'sp_timer';
const KEY_SCHEDULE   = 'sp_schedule';
const KEY_THEME      = 'sp_theme';
const KEY_WEEKLY_GOAL = 'sp_weekly_goal';

// ═══════════════════════════════════════════════════════
//  THEME
// ═══════════════════════════════════════════════════════
let currentTheme = LS.get(KEY_THEME, 'dark');
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  const icon = document.getElementById('theme-icon');
  if (icon) icon.className = t === 'dark' ? 'ri-moon-line' : 'ri-sun-line';
}
function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  LS.set(KEY_THEME, currentTheme);
  applyTheme(currentTheme);
}
applyTheme(currentTheme);

// ═══════════════════════════════════════════════════════
//  DATA HELPERS
// ═══════════════════════════════════════════════════════
function getAllPartials() {
  const all = [];
  STUDY_DATA.forEach(cat => cat.subjects.forEach(subj =>
    subj.units.forEach(unit => unit.lessons.forEach(lesson =>
      lesson.branches.forEach(branch => branch.partials.forEach(p =>
        all.push({ ...p, branchId: branch.id, branchTitle: branch.title, lessonTitle: lesson.title, unitTitle: unit.title, subjectTitle: subj.title, subjectId: subj.id, catTitle: cat.title })
      ))
    ))
  ));
  return all;
}
function getAllBranches() {
  const all = [];
  STUDY_DATA.forEach(cat => cat.subjects.forEach(subj =>
    subj.units.forEach(unit => unit.lessons.forEach(lesson =>
      lesson.branches.forEach(branch =>
        all.push({ ...branch, lessonTitle: lesson.title, unitTitle: unit.title, subjectTitle: subj.title, subjectId: subj.id, catTitle: cat.title })
      )
    ))
  ));
  return all;
}
function findBranch(id) { return getAllBranches().find(b => b.id === id); }
function getBranchPartials(branchId) { return getAllPartials().filter(p => p.branchId === branchId); }

function getProgress() { return LS.get(KEY_PROGRESS, {}); }
function setPartialProgress(pid, data) {
  const p = getProgress();
  const existing = p[pid] || {};
  const merged = { ...existing, ...data };
  Object.keys(merged).forEach(key => merged[key] === undefined && delete merged[key]);
  p[pid] = merged;
  LS.set(KEY_PROGRESS, p);
}
function isCompleted(pid) { return !!(getProgress()[pid] || {}).completed; }
function getReviewCount(pid) { return ((getProgress()[pid] || {}).reviewCount) || 0; }

function getNotes(pid) { return (LS.get(KEY_NOTES, {}))[pid] || ''; }
function setNotes(pid, text) {
  const n = LS.get(KEY_NOTES, {});
  n[pid] = text;
  LS.set(KEY_NOTES, n);
}
function getExercises(pid) { return (LS.get(KEY_EXERCISES, {}))[pid] || []; }
function setExercises(pid, exs) {
  const e = LS.get(KEY_EXERCISES, {});
  e[pid] = exs;
  LS.set(KEY_EXERCISES, e);
}

function calcSubjectProgress(subjectId) {
  const allP = getAllPartials().filter(p => p.subjectId === subjectId);
  if (!allP.length) return 0;
  const done = allP.filter(p => isCompleted(p.id)).length;
  return Math.round((done / allP.length) * 100);
}
function calcBranchProgress(branchId) {
  const ps = getBranchPartials(branchId);
  if (!ps.length) return 0;
  const done = ps.filter(p => isCompleted(p.id)).length;
  return { done, total: ps.length, pct: Math.round((done / ps.length) * 100) };
}
function calcOverallProgress() {
  const all = getAllPartials();
  if (!all.length) return { done: 0, total: 0, pct: 0 };
  const done = all.filter(p => isCompleted(p.id)).length;
  return { done, total: all.length, pct: Math.round((done / all.length) * 100) };
}
function totalReviews() {
  const p = getProgress();
  return Object.values(p).reduce((s, v) => s + (v.reviewCount || 0), 0);
}
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

const SUBJ_META = {
  'subj-physics':      { icon: 'ri-flashlight-line',  color: '#f59e0b', bg: 'rgba(245,158,11,0.15)' },
  'subj-chem':         { icon: 'ri-flask-line',        color: '#ef4444', bg: 'rgba(239,68,68,0.12)' },
  'subj-maths':        { icon: 'ri-functions',         color: '#3b82f6', bg: 'rgba(59,130,246,0.12)' },
  'subj-svt':          { icon: 'ri-leaf-line',         color: '#22c55e', bg: 'rgba(34,197,94,0.12)' },
  'subj-philo':        { icon: 'ri-mind-map',          color: '#8b5cf6', bg: 'rgba(139,92,246,0.12)' },
  'subj-english':      { icon: 'ri-translate-2',       color: '#06b6d4', bg: 'rgba(6,182,212,0.12)' },
  'subj-french':       { icon: 'ri-quill-pen-line',    color: '#ec4899', bg: 'rgba(236,72,153,0.12)' },
  'subj-islamic':      { icon: 'ri-moon-fill',         color: '#10b981', bg: 'rgba(16,185,129,0.12)' },
  'subj-arabic':       { icon: 'ri-pen-nib-line',      color: '#f97316', bg: 'rgba(249,115,22,0.12)' },
  'subj-history-geo':  { icon: 'ri-map-2-line',        color: '#84cc16', bg: 'rgba(132,204,22,0.12)' },
};
function subjMeta(id) { return SUBJ_META[id] || { icon: 'ri-book-line', color: '#6c63ff', bg: 'rgba(108,99,255,0.15)' }; }

// ═══════════════════════════════════════════════════════
//  WEEKLY GOAL HELPERS (تم تعديلها لتواريخ الأسبوع)
// ═══════════════════════════════════════════════════════
function getCurrentWeekMonday() {
  const now = new Date();
  const day = now.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const monday = new Date(now);
  monday.setDate(now.getDate() + diff);
  monday.setHours(0, 0, 0, 0);
  return monday;
}
function getWeekEnd(monday) {
  const end = new Date(monday);
  end.setDate(monday.getDate() + 7); // الاثنين التالي (00:00)
  return end;
}
function getWeekKey() {
  const m = getCurrentWeekMonday();
  return `${m.getFullYear()}-${String(m.getMonth()+1).padStart(2,'0')}-${String(m.getDate()).padStart(2,'0')}`;
}
function getCurrentWeekRange() {
  const start = getCurrentWeekMonday();
  const end = getWeekEnd(start);
  return { start, end };
}
function formatDate(date) {
  const day = String(date.getDate()).padStart(2,'0');
  const month = String(date.getMonth()+1).padStart(2,'0');
  return `${day}/${month}`;
}
function getWeeklyGoal() {
  const goal = LS.get(KEY_WEEKLY_GOAL, null);
  if (goal && goal.weekMonday === getWeekKey()) {
    return goal;
  }
  if (goal) LS.set(KEY_WEEKLY_GOAL, null);
  return null;
}
function saveWeeklyGoal(partialIds) {
  LS.set(KEY_WEEKLY_GOAL, {
    weekMonday: getWeekKey(),
    startDate: getCurrentWeekMonday().toISOString(),
    endDate: getWeekEnd(getCurrentWeekMonday()).toISOString(),
    partials: partialIds
  });
}
function clearWeeklyGoal() {
  LS.set(KEY_WEEKLY_GOAL, null);
}
function calcGoalProgress(goal) {
  const { partials } = goal;
  const start = new Date(goal.startDate);
  const end = new Date(goal.endDate);
  let done = 0;
  partials.forEach(pid => {
    const p = getProgress()[pid];
    if (p && p.completed && p.completedAt) {
      const compDate = new Date(p.completedAt);
      if (compDate >= start && compDate < end) done++;
    }
  });
  return { done, total: partials.length, pct: partials.length ? Math.round((done / partials.length) * 100) : 0 };
}

// ═══════════════════════════════════════════════════════
//  ROUTER
// ═══════════════════════════════════════════════════════
let currentPage = 'home';
let historyStack = [];

function nav(page, push = true) {
  console.log('nav to', page);
  if (push && currentPage !== page) historyStack.push(currentPage);
  currentPage = page;
  updateNav(page);
  renderPage(page);
}
function goBack() {
  const prev = historyStack.pop();
  if (prev) nav(prev, false);
  else nav('home', false);
}
function updateNav(page) {
  document.querySelectorAll('.nav-item').forEach(b => {
    b.classList.toggle('active', b.dataset.page === page);
  });
  const mainPages = ['home','subjects','schedule','stats'];
  const isMain = mainPages.includes(page);
  document.getElementById('back-btn').style.display = isMain ? 'none' : '';
  const titles = { home: 'منصة الدراسة', subjects: 'المواد الدراسية', schedule: 'جدول المراجعة', stats: 'الإحصائيات' };
  if (page.startsWith('branch:')) {
    const branch = findBranch(page.replace('branch:', ''));
    document.getElementById('header-title').textContent = branch ? branch.title : 'الفرع';
  } else {
    document.getElementById('header-title').textContent = titles[page] || 'منصة الدراسة';
  }
}

// ═══════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════════════════════
//  RENDER ENGINE
// ═══════════════════════════════════════════════════════
function renderPage(page) {
  const container = document.getElementById('page-content');
  if (!container) return;
  container.scrollTop = 0;
  try {
    if (page === 'home')              container.innerHTML = renderHome();
    else if (page === 'subjects')     { container.innerHTML = renderSubjects(); updateSubjectsResults(); }
    else if (page === 'schedule')     container.innerHTML = renderSchedule();
    else if (page === 'stats')        container.innerHTML = renderStats();
    else if (page.startsWith('branch:')) {
      container.innerHTML = renderBranch(page.replace('branch:', ''));
      initBranchEvents();
    }
  } catch (e) {
    console.error('خطأ في عرض الصفحة:', e);
    container.innerHTML = '<div class="page-inner"><p>حدث خطأ أثناء تحميل الصفحة.</p></div>';
  }
}

// ═══════════════════════════════════════════════════════
//  HOME PAGE (مع بطاقة الهدف الأسبوعي)
// ═══════════════════════════════════════════════════════
function renderHome() {
  const overall = calcOverallProgress();
  const r = 35, c = 2 * Math.PI * r;
  const offset = c - (overall.pct / 100) * c;

  const prog = getProgress();
  const studiedBranchIds = new Set();
  getAllPartials().forEach(p => {
    if (prog[p.id] && (prog[p.id].completed || prog[p.id].reviewCount > 0)) {
      studiedBranchIds.add(p.branchId);
    }
  });
  const allBranches = getAllBranches();
  const studiedBranches = allBranches.filter(b => studiedBranchIds.has(b.id)).slice(0, 5);
  const totalLessons = allBranches.length;

  // الهدف الأسبوعي مع تواريخ البداية والنهاية
  const weeklyGoal = getWeeklyGoal();
  let goalCard = '';
  if (weeklyGoal && weeklyGoal.partials.length) {
    const gp = calcGoalProgress(weeklyGoal);
    const gr = 30, gc = 2 * Math.PI * gr;
    const goffset = gc - (gp.pct / 100) * gc;
    const startDate = weeklyGoal.startDate ? formatDate(new Date(weeklyGoal.startDate)) : '';
    const endDate = weeklyGoal.endDate ? formatDate(new Date(weeklyGoal.endDate)) : '';
    const dateRange = startDate && endDate ? `(${startDate} - ${endDate})` : '';

    goalCard = `
    <div class="goal-progress-card">
      <div class="goal-circle-wrap">
        <svg width="70" height="70" viewBox="0 0 70 70">
          <circle cx="35" cy="35" r="${gr}" fill="none" stroke="var(--bg3)" stroke-width="6"/>
          <circle cx="35" cy="35" r="${gr}" fill="none" stroke="var(--accent)" stroke-width="6" stroke-linecap="round"
            stroke-dasharray="${gc}" stroke-dashoffset="${goffset}" transform="rotate(-90 35 35)" style="transition: stroke-dashoffset 0.6s ease"/>
        </svg>
        <div class="goal-circle-text">
          <span>${gp.pct}%</span>
          <span class="goal-circle-sub">الهدف</span>
        </div>
      </div>
      <div class="goal-info">
        <div class="goal-title">الهدف الأسبوعي</div>
        <div class="goal-desc">${gp.done} من ${gp.total} فقرة مكتملة هذا الأسبوع ${dateRange}</div>
        <button class="save-notes-btn" style="margin-top:8px; background:var(--bg3); color:var(--text);" onclick="openGoalModal()">تعديل الهدف</button>
      </div>
    </div>`;
  } else {
    goalCard = `
    <div class="goal-empty-card">
      <div style="color:var(--text2); margin-bottom:12px; font-size:15px; font-weight:600">🎯 الهدف الأسبوعي</div>
      <p style="font-size:13px; color:var(--text3); margin-bottom:16px;">حدد أهدافك لهذا الأسبوع لتحفيز الإنجاز</p>
      <button class="save-notes-btn" onclick="openGoalModal()"><i class="ri-add-line"></i> تحديد هدف</button>
    </div>`;
  }

  return `
  <div class="page-inner">
    <div class="home-hero">
      <div class="home-hero-label">مرحباً — باك مغرب ${new Date().getFullYear()}</div>
      <div class="home-hero-title">تقدمك الدراسي</div>
      <div class="home-hero-progress">
        <div class="progress-ring-wrap">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle class="progress-ring-bg" cx="40" cy="40" r="${r}"/>
            <circle class="progress-ring-fill" cx="40" cy="40" r="${r}"
              stroke-dasharray="${c}" stroke-dashoffset="${offset}"/>
          </svg>
          <div class="progress-ring-text">
            <span>${overall.pct}%</span>
            <span class="progress-ring-sub">مكتمل</span>
          </div>
        </div>
        <div class="home-hero-stats">
          <div class="home-hero-stat"><span>الفقرات المنجزة</span><strong>${overall.done}/${overall.total}</strong></div>
          <div class="home-hero-stat"><span>المراجعات</span><strong>${totalReviews()}</strong></div>
        </div>
      </div>
    </div>

    ${goalCard}

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-card-icon" style="color:var(--accent)"><i class="ri-book-open-line"></i></div>
        <div class="stat-card-val">${STUDY_DATA.reduce((s,c)=>s+c.subjects.length,0)}</div>
        <div class="stat-card-lbl">المادة</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-icon" style="color:var(--green)"><i class="ri-checkbox-circle-line"></i></div>
        <div class="stat-card-val">${overall.done}</div>
        <div class="stat-card-lbl">فقرة مكتملة</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-icon" style="color:var(--yellow)"><i class="ri-restart-line"></i></div>
        <div class="stat-card-val">${totalReviews()}</div>
        <div class="stat-card-lbl">مراجعة</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-icon" style="color:var(--blue)"><i class="ri-stack-line"></i></div>
        <div class="stat-card-val">${totalLessons}</div>
        <div class="stat-card-lbl">درس</div>
      </div>
    </div>

    ${studiedBranches.length ? `
    <div class="section-title">آخر ما درسته</div>
    <div class="recent-list">
      ${studiedBranches.map(b => {
        const meta = subjMeta(b.subjectId);
        const bp = calcBranchProgress(b.id);
        return `
        <div class="recent-item" onclick="nav('branch:${b.id}')">
          <div class="recent-item-icon" style="background:${meta.bg};color:${meta.color}">
            <i class="${meta.icon}"></i>
          </div>
          <div class="recent-item-info">
            <div class="recent-item-title">${b.title}</div>
            <div class="recent-item-sub">${b.subjectTitle} · ${bp.done}/${bp.total} فقرة</div>
          </div>
          <i class="ri-arrow-left-s-line" style="color:var(--text3);font-size:18px"></i>
        </div>`;
      }).join('')}
    </div>` : `
    <div class="empty-state">
      <i class="ri-book-open-line"></i>
      <p>ابدأ بالمذاكرة من قائمة المواد</p>
    </div>`}
  </div>`;
}

// ── بقية دوال الصفحات (subjects, schedule, stats, branch view) بدون تغيير ──
// ... (نفس الكود السابق بالكامل)

// ═══════════════════════════════════════════════════════
//  INIT (مع تنظيف الهدف الأسبوعي القديم)
// ═══════════════════════════════════════════════════════
(function initGoalClear() {
  const goal = LS.get(KEY_WEEKLY_GOAL, null);
  if (goal && goal.weekMonday !== getWeekKey()) {
    LS.set(KEY_WEEKLY_GOAL, null);
  }
})();

nav('home', false);
</script>
</body>
</html>
